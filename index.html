<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ETS2 Klips</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">🚛</div>
      <div>
        <h1>Euro Truck Simulator 2 – Klips</h1>
        <p class="subtitle">OneDrive-hostede videoer • tags • søgning</p>
      </div>
    </div>

    <div class="controls">
      <input id="search" class="search" type="text" placeholder="Søg i titel, tags, noter…" />
      <select id="sort" class="select">
        <option value="date_desc">Nyeste først</option>
        <option value="date_asc">Ældste først</option>
        <option value="title_asc">Titel A→Z</option>
        <option value="title_desc">Titel Z→A</option>
      </select>
      <button id="clear" class="btn">Nulstil</button>
    </div>

    <div id="tagbar" class="tagbar"></div>
  </header>

  <main class="container">
    <div id="stats" class="stats"></div>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty hidden">
      <h2>Ingen klips matcher din søgning/filtre.</h2>
      <p>Prøv at rydde søgning eller fjerne tags.</p>
    </div>
  </main>

  <footer class="footer">
    <span>Bygget med GitHub Pages • Data i <code>clips.json</code></span>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
